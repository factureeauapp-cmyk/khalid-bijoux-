server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  cors:
    allowed-origins:
      - http://localhost:3000
  jwt:
    secret: khalid-bijoux-secret-key-change-in-production-2024
    expiration-ms: 28800000  # 8 hours
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/khalidbijoux_db?useSSL=false&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  # 📦 SQL init (data.sql)
  sql:
    init:
      mode: always

  # 🌍 i18n
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false