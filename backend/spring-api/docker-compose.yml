version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: khalidbijoux-mysql
    restart: always
    environment:
      MYSQL_DATABASE: khalidbijoux_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: